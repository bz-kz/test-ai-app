[tool.ruff]
target-version = "py312"
line-length = 100
src = [".", "app"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "B008",  # FastAPI の Depends() をデフォルト引数で使うのは公式パターンであり誤検知
]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "standard"
include = ["."]
exclude = [".venv", "tests/integration"]
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: tests that require live Postgres and Ollama (deselected by default)",
]
addopts = "-m 'not integration'"
testpaths = ["tests"]

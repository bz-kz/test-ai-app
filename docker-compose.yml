# ローカル開発用 compose。本番オーケストレーション（k8s等）は対象外。
# llm と postgres はホストへポートを公開しない — local-llm-and-phi.md §1 参照。
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://app:app@postgres:5432/app
      - LLM_BASE_URL=http://llm:11434
      - LLM_MODEL=gemma4:e4b
      - LLM_TIMEOUT_S=300
      # ASR サービス設定 (BE-014/BE-017)
      - ASR_BASE_URL=http://asr:8080
      - ASR_MODEL=ggml-medium-q5_0.bin
      - ASR_TIMEOUT_S=90
      # ストリーミング ASR 設定 (BE-017 / ADR-0003)
      - ASR_STREAM_CHUNK_SECONDS=10
      - ASR_STREAM_TOTAL_TIMEOUT_S=180
      - ASR_STREAM_FIRST_CHUNK_LATENCY_S=25
    depends_on:
      postgres:
        condition: service_healthy
      llm:
        condition: service_started
      asr:
        condition: service_started
    healthcheck:
      # python:slim に curl は含まれないため python -c で代替。/ping はプロセス生存確認のみ。
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping', timeout=4)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ポートをホストへ公開しない — internal-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - internal

  llm:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # ポートをホストへ公開しない — internal-only（PHIルール §1）
    networks:
      - internal

  asr:
    # GHCR イメージ (ghcr.io/ggml-org/whisper.cpp:main) は linux/amd64 のみ。
    # Apple Silicon (arm64) 上で Rosetta 2 エミュレーションすると GGML CPU 検出ループで
    # 無限スピン（2026-05-12 確認）するため、ネイティブビルドを使用する。
    # docker/asr/Dockerfile が arm64 / amd64 の両方に対応した cmake ビルドを提供する。
    build:
      context: ./docker/asr
      dockerfile: Dockerfile
    volumes:
      - asr_data:/models
    # ポートをホストへ公開しない — internal-only（PHIルール §1 / ADR-0001）
    # 起動時: /models に ggml-medium-q5_0.bin がなければ HuggingFace からダウンロード後にサーバ起動。
    # Dockerfile CMD で定義済み — compose の command は不要。
    healthcheck:
      # モデルダウンロード込みの初回起動を考慮して start_period を長めに設定。
      # 軽量 TCP 確認のみ — 全文トランスクリプションは実行しない（RAM 節約）。
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(4); s.connect(('localhost',8080)); s.close()",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  asr_data:
